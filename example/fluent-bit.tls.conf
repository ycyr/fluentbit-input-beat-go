[SERVICE]
    Flush        1
    Log_Level    info
    Plugins_File /fluent-bit/etc/plugins.conf

# Beats input with mTLS. ca_file + tls_active => RequireAndVerifyClientCert,
# so Filebeat must present a client cert signed by the same CA. Drop ca_file
# (and the client cert in filebeat.tls.yml) to demo plain server-TLS instead.
[INPUT]
    Name         beats
    Tag          beats.*
    address      0.0.0.0:5044
    tls_active   true
    cert_file    /certs/server.crt
    key_file     /certs/server.key
    ca_file      /certs/ca.crt

[OUTPUT]
    Name   stdout
    Match  *
