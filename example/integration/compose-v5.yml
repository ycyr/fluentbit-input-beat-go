services:
  fluent-bit:
    image: ${BEATS_TEST_IMAGE}
    volumes:
      - ./fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro

  filebeat:
    image: docker.elastic.co/beats/filebeat:5.6.16
    user: root
    command: filebeat -e -strict.perms=false
    volumes:
      - ./test.log:/logs/test.log:ro
      - ./filebeat5.yml:/usr/share/filebeat/filebeat.yml:ro
    depends_on:
      - fluent-bit
    restart: on-failure
