[SERVICE]
    Flush        1
    Log_Level    info
    Plugins_File /fluent-bit/etc/plugins.conf

# Enable both protocol versions: Filebeat 6 uses v1, 7+ uses v2.
[INPUT]
    Name         beats
    Tag          beats.*
    address      0.0.0.0:5044
    enable_v1    true
    enable_v2    true

[OUTPUT]
    Name   stdout
    Match  *
