[SERVICE]
    Flush        1
    Log_Level    info
    Plugins_File /fluent-bit/etc/plugins.conf

# Beats / Lumberjack input.
# Reserved keys (host, port, listen, tls.*) cannot be used on Go input
# plugins, so this plugin exposes custom keys: address, tls_active, etc.
[INPUT]
    Name         beats
    Tag          beats.*
    address      0.0.0.0:5044
    buffer_size  16384
    enable_v1    false
    enable_v2    true
    # --- TLS: server-TLS ---
    # tls_active true
    # cert_file  /fluent-bit/etc/certs/server.crt
    # key_file   /fluent-bit/etc/certs/server.key
    # --- mTLS: also set ca_file to require a client certificate ---
    # ca_file    /fluent-bit/etc/certs/ca.crt

[OUTPUT]
    Name   stdout
    Match  *
