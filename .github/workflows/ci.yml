name: CI

on:
  push:
    branches: [master, main]
  pull_request:

# fluent-bit-go has no tagged releases; the pseudo-version in go.mod may not
# resolve via proxy.golang.org — bypass it for all go commands.
env:
  GOPROXY: direct

jobs:

  # ── Unit tests ─────────────────────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go mod download
      - run: CGO_ENABLED=1 go test -v ./...

  # ── Build (amd64 + arm64) ──────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            cc: gcc
          - arch: arm64
            cc: aarch64-linux-gnu-gcc
            apt: gcc-aarch64-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install cross-compiler
        if: matrix.apt != ''
        run: sudo apt-get install -y ${{ matrix.apt }}
      - run: go mod download
      - name: Build shared object
        env:
          CGO_ENABLED: 1
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CC: ${{ matrix.cc }}
        run: go build -trimpath -buildmode=c-shared -o in_beats.so .
      - uses: actions/upload-artifact@v4
        with:
          name: in_beats-linux-${{ matrix.arch }}
          path: in_beats.so

  # ── Integration tests (push to master only — pulls many Docker images) ─────
  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go mod download
      - name: Version matrix — Filebeat 5 / 6 / 7 / 8
        run: CGO_ENABLED=1 go test -v -tags integration -run 'TestFilebeat' -timeout 15m ./...
      - name: Transport matrix — no-TLS / TLS / mTLS
        run: CGO_ENABLED=1 go test -v -tags integration -run 'TestTransport' -timeout 10m ./...
