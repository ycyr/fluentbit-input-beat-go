name: CI

on:
  push:
    branches: [main, 'feature/**']
  pull_request:

# fluent-bit-go has no tagged releases; the pseudo-version in go.mod may not
# resolve via proxy.golang.org — bypass it for all go commands.
env:
  GOPROXY: direct

jobs:

  # ── Unit tests ─────────────────────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go mod download
      - run: CGO_ENABLED=1 go test -v ./...

  # ── Integration tests (push to main only — pulls many Docker images) ────────
  integration:
    name: Integration tests
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go mod download
      - name: Version matrix — Filebeat 5 / 6 / 7 / 8
        run: CGO_ENABLED=1 go test -v -tags integration -run 'TestFilebeat' -timeout 15m ./...
      - name: Transport matrix — no-TLS / TLS / mTLS
        run: CGO_ENABLED=1 go test -v -tags integration -run 'TestTransport' -timeout 10m ./...
